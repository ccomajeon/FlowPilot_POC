spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/todos}
    username: ${DB_USERNAME:todo_app}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}
server:
  error:
    include-message: never
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
