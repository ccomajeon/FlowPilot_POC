spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/todos}
    username: ${DB_USERNAME:todo_app}
    password: ${DB_PASSWORD:}
  flyway:
    url: ${FLYWAY_DB_URL}
    user: ${FLYWAY_DB_USERNAME}
    password: ${FLYWAY_DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}
          jwk-set-uri: ${JWT_JWK_SET_URI}
todo:
  security:
    audience: ${JWT_AUDIENCE}
server:
  error:
    include-message: never
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
        liveness:
          include: livenessState,ping
  health:
    db:
      enabled: true
logging:
  structured:
    format:
      console: logstash
  level:
    org.springframework.web: INFO
